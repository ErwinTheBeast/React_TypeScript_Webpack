name: Deploy Webpack to GitHub Pages

on:
  push:
    branches: [ "master" ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to avoid conflicts
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 25
      uses: actions/setup-node@v4
      with:
        node-version: '25'

    - name: Build Project
      run: |
        yarn install
        yarn clean
        yarn build

    - name: Upload production artifacts
      uses: actions/upload-pages-artifact@v3 # upload the production artifacts to the GitHub Pages
      with:
        # CHANGE THIS to your actual Webpack output folder (e.g., './dist' or './build')
        path: './build' # the path to the production artifacts

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 # deploy the production artifacts to the GitHub Pages
